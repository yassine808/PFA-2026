<!DOCTYPE html>
<html>
<head>
    <title>Steam Gaming Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <style>
        /* Chatbot Styles */
        :root {
            --bot-bg: rgba(37, 37, 56, 0.9);
            --user-bg: rgba(74, 158, 255, 0.2);
            --border-color: rgba(45, 45, 68, 0.8);
            --accent-color: #4a9eff;
        }
        
        .chatbot-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 80px);
        }
        
        .chat-header {
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(37, 37, 56, 0.9);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }
        
        .chat-header h1 {
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #4a9eff, #6b5ce7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .chat-header p {
            color: #b0b0d0;
            font-size: 0.9rem;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: rgba(18, 18, 28, 0.7);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        
        .message.user {
            align-items: flex-end;
        }
        
        .message.bot {
            align-items: flex-start;
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            position: relative;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        
        .user .message-content {
            background: var(--user-bg);
            color: #fff;
            border: 1px solid rgba(74, 158, 255, 0.3);
            border-bottom-right-radius: 4px;
        }
        
        .bot .message-content {
            background: var(--bot-bg);
            color: #fff;
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }
        
        .message-sender {
            font-size: 0.75rem;
            color: #6b6b8a;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .bot .message-sender {
            color: #6b5ce7;
        }
        
        .user .message-sender {
            color: #4a9eff;
        }
        
        .message-time {
            font-size: 0.7rem;
            color: #6b6b8a;
            margin-top: 5px;
        }
        
        .chat-input-container {
            display: flex;
            gap: 10px;
            padding: 20px;
            background: rgba(37, 37, 56, 0.9);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(30, 30, 46, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            resize: none;
            min-height: 50px;
            max-height: 150px;
            font-family: inherit;
        }
        
        .chat-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(74, 158, 255, 0.2);
        }
        
        .chat-input::placeholder {
            color: #6b6b8a;
        }
        
        .send-button {
            padding: 0 20px;
            background: linear-gradient(90deg, #4a9eff, #6b5ce7);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 60px;
        }
        
        .send-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(74, 158, 255, 0.3);
        }
        
        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .loading-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #6b5ce7;
            font-size: 0.8rem;
            padding: 10px 16px;
        }
        
        .loading-dots {
            display: flex;
            gap: 4px;
        }
        
        .loading-dots span {
            width: 6px;
            height: 6px;
            background: #6b5ce7;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
        
        /* Suggestions */
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        
        .suggestion-button {
            padding: 8px 12px;
            background: rgba(30, 30, 46, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #b0b0d0;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .suggestion-button:hover {
            background: rgba(45, 45, 68, 0.9);
            color: #fff;
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }
        
        /* Scrollbar */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: rgba(37, 37, 56, 0.5);
            border-radius: 3px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: #4a9eff;
            border-radius: 3px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .chatbot-container {
                height: calc(100vh - 60px);
                padding: 10px;
            }
            
            .message-content {
                max-width: 85%;
            }
            
            .chat-input-container {
                padding: 15px;
            }
            
            .chat-input {
                min-height: 45px;
                font-size: 0.85rem;
            }
        }
        
        @media (max-width: 480px) {
            .chat-header {
                padding: 15px;
            }
            
            .chat-header h1 {
                font-size: 1.5rem;
            }
            
            .suggestions {
                justify-content: center;
            }
            
            .suggestion-button {
                font-size: 0.8rem;
                padding: 6px 10px;
            }
        }
        
        /* Welcome message */
        .welcome-message {
            text-align: center;
            padding: 30px 20px;
            color: #b0b0d0;
        }
        
        .welcome-message h3 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }
        
        .welcome-message p {
            font-size: 0.9rem;
            max-width: 500px;
            margin: 0 auto 20px;
        }
        .clear-history-btn:hover {
            background: rgba(244, 67, 54, 0.3) !important;
            transform: translateY(-1px) !important;
        }
    </style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
    <div class="radio-container">
        <input id="radio-charts" name="radio" type="radio" />
        <label for="radio-charts">Charts</label>

        <input id="radio-reviews" name="radio" type="radio" />
        <label for="radio-reviews">Reviews</label>

        <input id="radio-chatbot" name="radio" type="radio" checked/>
        <label for="radio-chatbot">Chatbot</label>

        <div class="glider-container">
            <div class="glider"></div>
        </div>
    </div>

    <!-- Theme Switch -->
    <label class="theme-switch">
        <input type="checkbox" class="theme-switch__checkbox">
        <div class="theme-switch__container">
            <div class="theme-switch__clouds"></div>
            <div class="theme-switch__stars-container">
                <!-- SVG omitted for brevity -->
            </div>
            <div class="theme-switch__circle-container">
                <div class="theme-switch__sun-moon-container">
                    <div class="theme-switch__moon">
                        <div class="theme-switch__spot"></div>
                        <div class="theme-switch__spot"></div>
                        <div class="theme-switch__spot"></div>
                    </div>
                </div>
            </div>
        </div>
    </label>
</div>

<div class="wrapper">
    <div class="chatbot-container">
        <div class="chat-header">
            <h1>Steam Gaming Assistant</h1>
            <p>Ask me anything about Steam games, reviews, and statistics!</p>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <!-- Welcome message -->
            <div class="welcome-message">
                <h3>👋 Hello! I'm your Steam Gaming Assistant</h3>
                <p>I can help you analyze game reviews, provide insights about Steam games, and answer questions about gaming statistics.</p>
                
                <div class="suggestions">
                    <button class="suggestion-button" onclick="sendSuggestion(this)">What are the top rated games?</button>
                    <button class="suggestion-button" onclick="sendSuggestion(this)">Tell me about game reviews</button>
                    <button class="suggestion-button" onclick="sendSuggestion(this)">How to analyze playtime?</button>
                    <button class="suggestion-button" onclick="sendSuggestion(this)">Show me gaming trends</button>
                </div>
            </div>
        </div>
        
        <div class="chat-input-container">
            <textarea 
                class="chat-input" 
                id="chatInput" 
                placeholder="Type your message here..."
                rows="1"
                onkeydown="handleKeyPress(event)"
            ></textarea>
            <button class="send-button" id="sendButton" onclick="sendMessage()">
                Send
            </button>
        </div>
    </div>
</div>

<script>
    // Theme toggle
    const themeSwitch = document.querySelector('.theme-switch__checkbox');
    if (localStorage.getItem('theme') === 'dark') {
        themeSwitch.checked = true;
        document.body.style.background = '#121212';
        document.body.style.color = '#fff';
    }
    themeSwitch.addEventListener('change', () => {
        if (themeSwitch.checked) {
            document.body.style.background = '#121212';
            document.body.style.color = '#fff';
            localStorage.setItem('theme', 'dark');
        } else {
            document.body.style.background = '#fff';
            document.body.style.color = '#000';
            localStorage.setItem('theme', 'light');
        }
    });

    // Navigation
    document.getElementById('radio-charts').addEventListener('click', () => {
        window.location.href = '/';
    });
    document.getElementById('radio-reviews').addEventListener('click', () => {
        window.location.href = '/reviews';
    });
    document.getElementById('radio-chatbot').addEventListener('click', () => {
        window.location.href = '/chatbot';
    });

    // Chat functionality
    let chatHistory = [];
    let isProcessing = false;
    
    // Auto-resize textarea
    const chatInput = document.getElementById('chatInput');
    chatInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 150) + 'px';
    });
    
    // Format time
    function formatTime(date) {
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    
    // Add message to chat
    function addMessage(content, sender, timestamp = new Date()) {
        const chatMessages = document.getElementById('chatMessages');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}`;
        
        const senderName = sender === 'user' ? 'You' : 'Steam Assistant';
        const senderIcon = sender === 'user' ? '👤' : '🤖';
        
        messageDiv.innerHTML = `
            <div class="message-sender">
                <span>${senderIcon}</span>
                <span>${senderName}</span>
            </div>
            <div class="message-content">${content}</div>
            <div class="message-time">${formatTime(timestamp)}</div>
        `;
        
        chatMessages.appendChild(messageDiv);
        
        // Scroll to bottom
        setTimeout(() => {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }, 100);
        
        // Add to history
        chatHistory.push({
            role: sender,
            content: content,
            timestamp: timestamp.toISOString()
        });
        
        // Keep only last 20 messages in memory
        if (chatHistory.length > 20) {
            chatHistory = chatHistory.slice(-20);
        }
    }
    
    // Show loading indicator
    function showLoading() {
        const chatMessages = document.getElementById('chatMessages');
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message bot';
        loadingDiv.id = 'loadingIndicator';
        
        loadingDiv.innerHTML = `
            <div class="message-sender">
                <span>🤖</span>
                <span>Steam Assistant</span>
            </div>
            <div class="loading-indicator">
                <div class="loading-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <span>Thinking...</span>
            </div>
        `;
        
        chatMessages.appendChild(loadingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    
    // Hide loading indicator
    function hideLoading() {
        const loadingDiv = document.getElementById('loadingIndicator');
        if (loadingDiv) {
            loadingDiv.remove();
        }
    }
    
    // Send message with streaming support
    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        const sendButton = document.getElementById('sendButton');
        
        if (!message || isProcessing) return;
        
        // Clear input
        input.value = '';
        input.style.height = 'auto';
        
        // Disable input while processing
        isProcessing = true;
        input.disabled = true;
        sendButton.disabled = true;
        
        // Add user message
        addMessage(message, 'user');
        
        // Show loading
        showLoading();
        
        try {
            // Use streaming endpoint
            const response = await fetch('/api/chat/stream', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    message: message
                })
            });
            
            // Hide loading indicator
            hideLoading();
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            // Create bot message container
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            
            const senderName = 'Steam Assistant';
            const senderIcon = '🤖';
            
            messageDiv.innerHTML = `
                <div class="message-sender">
                    <span>${senderIcon}</span>
                    <span>${senderName}</span>
                </div>
                <div class="message-content" id="streamingMessage"></div>
                <div class="message-time">${formatTime(new Date())}</div>
            `;
            
            chatMessages.appendChild(messageDiv);
            
            // Get the message content container
            const messageContent = document.getElementById('streamingMessage');
            
            // Read the stream
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullResponse = '';
            
            while (true) {
                const { done, value } = await reader.read();
                
                if (done) {
                    // Update chat history with complete response
                    chatHistory.push({
                        role: 'user',
                        content: message,
                        timestamp: new Date().toISOString()
                    });
                    chatHistory.push({
                        role: 'assistant',
                        content: fullResponse,
                        timestamp: new Date().toISOString()
                    });
                    
                    // Keep only last 20 messages
                    if (chatHistory.length > 20) {
                        chatHistory = chatHistory.slice(-20);
                    }
                    
                    // Change ID to prevent duplicate IDs
                    messageContent.removeAttribute('id');
                    
                    break;
                }
                
                // Decode and process the chunk
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.substring(6);
                        
                        if (data === '[DONE]') {
                            continue;
                        }
                        
                        if (data.trim()) {
                            fullResponse += data;
                            
                            // Clean and format the response
                            const formattedResponse = formatChatResponse(fullResponse);
                            messageContent.innerHTML = formattedResponse;
                            
                            // Scroll to bottom
                            chatMessages.scrollTop = chatMessages.scrollHeight;
                        }
                    }
                }
            }
            
        } catch (error) {
            console.error('Chat error:', error);
            hideLoading();
            addMessage('Sorry, I encountered an error. Please try again.', 'bot');
        } finally {
            // Re-enable input
            isProcessing = false;
            input.disabled = false;
            sendButton.disabled = false;
            input.focus();
        }
    }

    function formatChatResponse(text) {
        // Clean and format the response
        let formatted = text
            // Fix: Add space after period in numbered lists
            .replace(/(\d+)\.([A-Za-z])/g, '$1. $2')
            // Fix: Ensure proper spacing for game names
            .replace(/([a-zA-Z])(\d+)/g, '$1 $2')
            // Convert line breaks to HTML
            .replace(/\n/g, '<br>')
            // Make headers bold
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            // Fix bullet points
            .replace(/^\s*[-*•]\s*(.*)/gm, '• $1<br>');
        
        return formatted;
    }

    // Add clear history function
    function clearChatHistory() {
        if (confirm('Are you sure you want to clear the chat history?')) {
            fetch('/api/chat/clear', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // Clear local chat history
                    chatHistory = [];
                    
                    // Clear chat messages (keep welcome message)
                    const chatMessages = document.getElementById('chatMessages');
                    const welcomeMessage = chatMessages.querySelector('.welcome-message');
                    
                    // Clear all messages except welcome
                    chatMessages.innerHTML = '';
                    if (welcomeMessage) {
                        chatMessages.appendChild(welcomeMessage);
                    }
                    
                    // Add new welcome message from bot
                    setTimeout(() => {
                        addMessage("Chat history cleared! How can I help you with Steam games today?", 'bot');
                    }, 300);
                }
            })
            .catch(error => {
                console.error('Clear history error:', error);
                alert('Failed to clear chat history');
            });
        }
    }

    // Function to update suggestions with real game names
    function updateSuggestionsWithRealGames(games) {
        if (games && games.length >= 4) {
            const suggestions = document.querySelectorAll('.suggestion-button');
            
            // Update suggestion buttons with real game names
            suggestions[0].textContent = `Tell me about ${games[0].name}`;
            suggestions[0].onclick = function() {
                document.getElementById('chatInput').value = `Tell me about ${games[0].name}`;
                sendMessage();
            };
            
            suggestions[1].textContent = `What's popular right now?`;
            suggestions[1].onclick = function() {
                document.getElementById('chatInput').value = `What are the most popular games?`;
                sendMessage();
            };
            
            suggestions[2].textContent = `Analyze ${games[1].name} reviews`;
            suggestions[2].onclick = function() {
                document.getElementById('chatInput').value = `Analyze reviews for ${games[1].name}`;
                sendMessage();
            };
            
            suggestions[3].textContent = `Compare ${games[2].name} and ${games[3].name}`;
            suggestions[3].onclick = function() {
                document.getElementById('chatInput').value = `Compare ${games[2].name} and ${games[3].name}`;
                sendMessage();
            };
        }
    }
    
    // Send suggestion
    function sendSuggestion(button) {
        const message = button.textContent;
        document.getElementById('chatInput').value = message;
        sendMessage();
    }
    
    // Handle Enter key
    function handleKeyPress(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    }
    
    // Initialize - ONLY ONE DOMContentLoaded event listener
    document.addEventListener('DOMContentLoaded', function() {
        // Add welcome message from bot
        setTimeout(() => {
            addMessage("Hello! I'm your Steam Gaming Assistant. I can help you analyze game reviews, find popular games, and provide insights about gaming statistics. What would you like to know?", 'bot');
        }, 500);
        
        // Focus input
        document.getElementById('chatInput').focus();
        
        // Load game info for context
        fetch('/api/game_info')
            .then(response => response.json())
            .then(data => {
                if (data.success && data.games && data.games.length > 0) {
                    // Store game info for context
                    window.gameInfo = data.games;
                    
                    // Update suggestions with actual game names
                    updateSuggestionsWithRealGames(data.games);
                }
            })
            .catch(error => console.error('Failed to load game info:', error));
        
        // Add clear button to header
        const chatHeader = document.querySelector('.chat-header');
        const clearButton = document.createElement('button');
        clearButton.className = 'clear-history-btn';
        clearButton.innerHTML = '🗑️ Clear History';
        clearButton.style.cssText = `
            margin-top: 10px;
            padding: 5px 10px;
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        `;
        clearButton.onmouseover = function() {
            this.style.background = 'rgba(244, 67, 54, 0.3)';
            this.style.transform = 'translateY(-1px)';
        };
        clearButton.onmouseout = function() {
            this.style.background = 'rgba(244, 67, 54, 0.2)';
            this.style.transform = 'translateY(0)';
        };
        clearButton.onclick = clearChatHistory;
        chatHeader.appendChild(clearButton);
    });
</script>

</body>
</html>
